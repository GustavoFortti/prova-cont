<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Microeconomia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f11;--surface:#16181c;--border:#2a2d34;
    --accent:#c8f03a;--accent-dim:rgba(200,240,58,.12);--accent-dim2:rgba(200,240,58,.06);
    --red:#ff5b5b;--red-dim:rgba(255,91,91,.12);
    --text:#e8eaf0;--muted:#6b7280;--card-r:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding:40px 20px 80px;position:relative;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.3;pointer-events:none}
  .container{max-width:760px;margin:0 auto;position:relative}
  header{margin-bottom:48px;animation:fadeUp .6s ease both}
  .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  h1{font-family:'DM Serif Display',serif;font-size:clamp(28px,5vw,44px);line-height:1.1}
  h1 em{font-style:italic;color:var(--accent)}
  .subtitle{margin-top:10px;color:var(--muted);font-size:14px}
  .progress-wrap{margin-bottom:36px;animation:fadeUp .6s .1s ease both}
  .progress-label{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
  .score-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim2);border:1px solid var(--border);border-radius:99px;padding:4px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:32px;animation:fadeUp .6s .15s ease both}
  .score-badge .score-val{color:var(--accent);font-weight:500}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-r);padding:28px 28px 24px;margin-bottom:16px;animation:fadeUp .5s ease both;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .3s}
  .card.answered-correct::before{background:var(--accent)}
  .card.answered-wrong::before{background:var(--red)}
  .q-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .q-num{flex-shrink:0;width:32px;height:32px;background:var(--accent-dim2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);transition:all .3s}
  .card.answered-correct .q-num{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .card.answered-wrong .q-num{background:var(--red-dim);border-color:var(--red);color:var(--red)}
  .q-text{font-size:15px;line-height:1.6;color:var(--text)}
  .q-caption{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:14px;font-weight:500}
  .ponder-list{margin:12px 0 18px;display:flex;flex-direction:column;gap:6px}
  .ponder-item{background:var(--accent-dim2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13.5px;line-height:1.55;color:#b0b6c2}
  .ponder-item strong{color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;display:inline-block;margin-right:6px}
  .data-box{background:var(--accent-dim2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:12px 0 18px;font-family:'DM Mono',monospace;font-size:12.5px;line-height:1.8;color:#a0aab8}
  .data-box span{color:var(--accent)}
  .section-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim2);border:1px solid rgba(200,240,58,.2);border-radius:4px;padding:2px 8px;margin-bottom:14px}
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s;background:transparent;text-align:left;font-family:'DM Sans',sans-serif;font-size:13.5px;color:#9ba3b2;width:100%}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim2);color:var(--text)}
  .opt-bullet{flex-shrink:0;width:22px;height:22px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);transition:all .18s}
  .opt:hover:not(:disabled) .opt-bullet{border-color:var(--accent);color:var(--accent)}
  .opt.is-correct{border-color:var(--accent)!important;background:var(--accent-dim)!important;color:var(--accent)!important}
  .opt.is-correct .opt-bullet{background:var(--accent);border-color:var(--accent);color:#0e0f11}
  .opt.is-wrong{border-color:var(--red)!important;background:var(--red-dim)!important;color:var(--red)!important}
  .opt.is-wrong .opt-bullet{background:var(--red);border-color:var(--red);color:#fff}
  .opt.dim{opacity:.38}
  .opt:disabled{cursor:default}
  .btn-check{padding:10px 22px;background:var(--accent);color:#0e0f11;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:4px}
  .btn-check:hover{opacity:.88;transform:translateY(-1px)}
  .btn-check:active{transform:translateY(0)}
  .btn-check:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .feedback{margin-top:12px;padding:12px 16px;border-radius:8px;font-size:13.5px;line-height:1.6;display:none;animation:pop .25s ease}
  .feedback.correct{display:block;background:var(--accent-dim);border:1px solid rgba(200,240,58,.3);color:#d4f56e}
  .feedback.wrong{display:block;background:var(--red-dim);border:1px solid rgba(255,91,91,.3);color:#ff8e8e}
  .feedback.info{display:block;background:rgba(100,120,200,.1);border:1px solid rgba(100,120,200,.25);color:#a0b0e0}
  .fb-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;opacity:.7}
  .fb-list{margin:6px 0 0 18px;line-height:2}
  #results{display:none;margin-top:48px;animation:fadeUp .6s ease}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-r);padding:40px 32px;text-align:center;position:relative;overflow:hidden}
  .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#7fe87f)}
  .result-score{font-family:'DM Serif Display',serif;font-size:72px;color:var(--accent);line-height:1;margin-bottom:8px}
  .result-label{color:var(--muted);font-size:14px;margin-bottom:28px}
  .result-msg{font-size:15px;color:var(--text);margin-bottom:28px;line-height:1.6}
  .btn-restart{padding:12px 32px;background:var(--accent);color:#0e0f11;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .2s}
  .btn-restart:hover{opacity:.85}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.96);opacity:0}60%{transform:scale(1.015)}100%{transform:scale(1);opacity:1}}
  .card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.09s}
  .card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.15s}.card:nth-child(6){animation-delay:.18s}
  .card:nth-child(7){animation-delay:.21s}.card:nth-child(8){animation-delay:.24s}.card:nth-child(9){animation-delay:.27s}
  .card:nth-child(10){animation-delay:.30s}.card:nth-child(11){animation-delay:.33s}.card:nth-child(12){animation-delay:.36s}
  .card:nth-child(13){animation-delay:.39s}.card:nth-child(14){animation-delay:.42s}.card:nth-child(15){animation-delay:.45s}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Microeconomia · Simulado Completo</div>
    <h1>Quiz de <em>Economia</em></h1>
    <p class="subtitle">15 questões · Estruturas de mercado, elasticidade, custos e produção</p>
  </header>
  <div class="progress-wrap">
    <div class="progress-label"><span id="prog-text">0 / 15 respondidas</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
  <div class="score-badge">Pontuação: <span class="score-val" id="score-display">0 / 15</span></div>
  <div id="quiz"></div>
  <div id="results">
    <div class="result-card">
      <div class="result-score" id="res-score">0</div>
      <div class="result-label">de 15 pontos</div>
      <div class="result-msg" id="res-msg"></div>
      <button class="btn-restart" onclick="restart()">Tentar novamente</button>
    </div>
  </div>
</div>

<script>
const TOTAL = 15;
const questions = [
  {
    id:1,
    tag:"Cálculo · Break-Even Point",
    text:"Qual o break-even point?",
    data:[["Preço do Bem","R$ 65,00"],["Material direto","R$ 11,50/un"],["Mão de obra direta","R$ 8,50/un"],["Custo Fixo Total","R$ 12.060,00"]],
    type:"multi",
    options:[{id:"I",label:"2,68"},{id:"II",label:"268"},{id:"III",label:"278"},{id:"IV",label:"368"}],
    correct:"II",
    explanation:"CVu = 11,50 + 8,50 = R$ 20,00. Margem de contribuição = 65 − 20 = R$ 45,00. BEP = 12.060 ÷ 45 = <strong>268 unidades</strong>.",
  },
  {
    id:2,
    tag:"Cálculo · IEPDI",
    text:"Considerando Preço de bem em 15/01/2013 de R$ 0,50 e em 20/01/2013 de R$ 0,68, provocando uma queda de quantidade de 2.000 para 1.980 peças. A IEPDI será:",
    type:"multi",
    options:[{id:"I",label:"0,0027"},{id:"II",label:"3,17"},{id:"III",label:"0,027"},{id:"IV",label:"0,227"}],
    correct:"III",
    explanation:"%ΔQ = −20 / 2.000 = −1%. %ΔP = 0,18 / 0,50 = 36%. IEPDI = 1% ÷ 36% ≈ <strong>0,027</strong>. Demanda inelástica (IEPDI &lt; 1).",
  },
  {
    id:3,
    tag:"Cálculo · RT e CT",
    text:"Com os mesmos dados (BEP = 268 un.), qual a RT e CT no ponto de equilíbrio?",
    data:[["Preço do Bem","R$ 65,00"],["Material direto","R$ 11,50/un"],["Mão de obra direta","R$ 8,50/un"],["Custo Fixo Total","R$ 12.060,00"],["Qtd. BEP","268 unidades"]],
    type:"multi",
    options:[{id:"I",label:"17.450"},{id:"II",label:"18.420"},{id:"III",label:"17.420"},{id:"IV",label:"680"}],
    correct:"III",
    explanation:"RT = 65 × 268 = R$ 17.420. CT = 12.060 + (20 × 268) = 12.060 + 5.360 = R$ 17.420. No BEP, <strong>RT = CT = R$ 17.420</strong>.",
  },
  {
    id:4,
    tag:"Cálculo · Elasticidade-Renda",
    text:"Considerando que a renda dos consumidores se altere de R$ 1.650,00 para R$ 1.975,00 e a demanda de determinado bem tenha variação de 1.690 unidades para 1.890 unidades. A elasticidade-renda da demanda (Erd) será:",
    type:"multi",
    options:[{id:"I",label:"0,48"},{id:"II",label:"0,68"},{id:"III",label:"1,66"},{id:"IV",label:"3,15"}],
    correct:"III",
    explanation:"Conforme gabarito do professor: <strong>1,66</strong>. Nota: pela fórmula padrão Erd = (%ΔQ / %ΔRenda) = (200/1690) / (325/1650) ≈ 0,60. O professor utilizou a inversão %ΔRenda / %ΔQ = 19,70% / 11,83% ≈ 1,66. Verifique o método adotado em sala.",
  },
  {
    id:5,
    tag:"Pondere · Estruturas de Mercado",
    text:"Pondere:",
    items:[
      {key:"a",text:"Barreira ao acesso de novas empresas está presente no Oligopólio, não na Concorrência Monopolística."},
      {key:"b",text:"A concorrência Extra-preço é intensa no Oligopólio com produtos diferenciados, igualmente na Concorrência Perfeita."},
      {key:"c",text:"Investimentos elevados e legislação protetiva são barreiras presentes para ingresso no Monopólio, não na Concorrência Monopolística."},
      {key:"d",text:"Ações intensas de Marketing e Promoções são atividades extra-preço presentes na Concorrência Monopolística, não na Concorrência Perfeita."},
    ],
    type:"multi",
    options:[{id:"I",label:"c e d  incorretas"},{id:"II",label:"a e b  corretas"},{id:"III",label:"b e c  incorretas"},{id:"IV",label:"a e d  corretas"}],
    correct:"IV",
    explanation:"<strong>a: VERDADEIRO</strong> — barreiras de acesso são do Oligopólio. <strong>d: VERDADEIRO</strong> — marketing intenso é da Conc. Monopolística. b: FALSO — Conc. Perfeita não tem concorrência extra-preço. c: FALSO — Conc. Monopolística tem ingresso relativamente livre.",
  },
  {
    id:6,
    tag:"Pondere · Fatores de Produção",
    text:"Pondere:",
    items:[
      {key:"a",text:"Fatores de produção variáveis são aqueles que variam em função do custo de produção."},
      {key:"b",text:"Fatores de produção fixos são aqueles que não variam em função do volume de produção."},
      {key:"c",text:"Processo de produção múltiplo impõe necessidade de setup rápido."},
      {key:"d",text:"Mercado de oferta atomizado refere-se a Monopólio."},
    ],
    type:"multi",
    options:[{id:"I",label:"b e c  incorretas"},{id:"II",label:"c e d  corretas"},{id:"III",label:"a e d  incorretas"},{id:"IV",label:"a e b  corretas"}],
    correct:"III",
    explanation:"<strong>a: FALSO</strong> — fatores variáveis variam em função do <em>volume</em> de produção, não do custo. <strong>d: FALSO</strong> — mercado atomizado refere-se à Concorrência Perfeita (muitos pequenos ofertantes). b e c são verdadeiros.",
  },
  {
    id:7,
    tag:"Pondere · Maximização de Lucro",
    text:"Pondere:",
    items:[
      {key:"a",text:"Temos maximização de lucro quando RMg = LMg e o Custo Marginal for decrescente."},
      {key:"b",text:"LT = RT + CTMe."},
      {key:"c",text:"O objetivo da empresa é maximizar lucro, e isso pode ser obtido reduzindo custos fixos e variáveis e/ou aumentando a quantidade vendida."},
      {key:"d",text:"Receita Marginal é igual à variação da receita total dividida pela produção."},
    ],
    type:"multi",
    options:[{id:"I",label:"a e d  corretas"},{id:"II",label:"b e c  incorretas"},{id:"III",label:"a e b  incorretas"},{id:"IV",label:"c e d  corretas"}],
    correct:"III",
    explanation:"<strong>a: FALSO</strong> — a maximização ocorre com CMg <em>crescente</em>, não decrescente. <strong>b: FALSO</strong> — LT = RT − CT (não RT + CTMe). c: VERDADEIRO. d: FALSO — RMg = ΔRT/ΔQ (deve ser a <em>variação</em> da quantidade).",
  },
  {
    id:8,
    tag:"Pondere · Custos e Leis",
    text:"Pondere:",
    items:[
      {key:"a",text:"RT = CT − LT."},
      {key:"b",text:"CFme = CF / LT."},
      {key:"c",text:"CVT = CT − CFT."},
      {key:"d",text:"LEI DOS RENDIMENTOS CRESCENTES: elevando-se a quantidade do fator variável, permanecendo fixa a quantidade dos fatores demais, a produção aumentará a taxas crescentes; a seguir, depois de certa quantidade utilizada do fator variável, continuará a crescer mas a taxas decrescentes; continuando o incremento, a produção total chegará a um máximo para depois decrescer."},
    ],
    type:"multi",
    options:[{id:"I",label:"b e c  corretas"},{id:"II",label:"a e d  incorretas"},{id:"III",label:"c e d  incorretas"},{id:"IV",label:"a e b  corretas"}],
    correct:"I",
    explanation:"Conforme gabarito do professor: <strong>b e c corretas</strong>. c: VERDADEIRO — CVT = CT − CFT. Nota: a (RT = CT − LT) está invertida; d descreve a lei dos rendimentos decrescentes com outra nomenclatura.",
  },
  {
    id:9,
    tag:"Pondere · Estruturas de Mercado II",
    text:"Pondere:",
    items:[
      {key:"a",text:"No Monopólio, temos apenas uma empresa, barreira a acesso de novas empresas, e intensa ação de marketing."},
      {key:"b",text:"Concorrência Monopolística difere da Concorrência Perfeita nas condições de ingresso no mercado."},
      {key:"c",text:"Oligopólio difere do Duopólio na concorrência extra-preço."},
      {key:"d",text:"Na Concorrência Monopolística a concorrência extra-preço é intensa e o produto é diferenciado."},
    ],
    type:"multi",
    options:[{id:"I",label:"a e b  corretas"},{id:"II",label:"b e c  incorretas"},{id:"III",label:"c e d  corretas"},{id:"IV",label:"a e d  incorretas"}],
    correct:"II",
    explanation:"<strong>b: FALSO</strong> — Conc. Monopolística e Conc. Perfeita têm ingresso livre; não diferem nesse ponto. <strong>c: FALSO</strong> — Duopólio é caso especial de Oligopólio (apenas 2 empresas); a diferença não é a concorrência extra-preço. a: FALSO (marketing no Monopólio, quando existe, é institucional). d: VERDADEIRO.",
  },
  {
    id:10,
    tag:"Dissertativa · Elasticidade-Preço",
    text:"Quais os fatores que influenciam a elasticidade Preço-Demanda?",
    type:"open",
    bullets:["Importância do bem no orçamento do consumidor","Existência de bens substitutos","Essencialidade do bem"],
  },
  {
    id:11,
    tag:"Dissertativa · Produção",
    text:"Defina Produção, utilizando-se minimamente das seguintes palavras-chave: <em>input, processo múltiplo, setup, qualidade</em>.",
    type:"open",
    bullets:[
      "Produção é o PROCESSO de transformação de INPUT em output, atendendo a requisitos de QUALIDADE definidos pelo cliente.",
      "Os processos de produção podem ser simples ou MÚLTIPLOS.",
      "Nos processos de produção múltiplo, destaca-se a importância de SETUP rápidos.",
    ],
  },
  {
    id:12,
    tag:"Dissertativa · Receita e Custo Marginal",
    text:"Defina a diferença entre Receita Marginal e Custo Marginal.",
    type:"open",
    bullets:[
      "Receita Marginal (RMg): variação da receita total ao produzir/vender uma unidade adicional. RMg = ΔRT / ΔQ.",
      "Custo Marginal (CMg): variação do custo total ao produzir uma unidade adicional. CMg = ΔCT / ΔQ.",
      "A maximização do lucro ocorre quando RMg = CMg, com o CMg sendo crescente.",
    ],
  },
  {
    id:13,
    tag:"Dissertativa · Cartel",
    text:"Descreva Cartel e indique em que estrutura de mercado essa ação ocorre.",
    type:"open",
    bullets:[
      "Cartel é a formação de um conglomerado de empresas de um mesmo ramo que se associam para formar preço e evitar concorrência.",
      "Ocorre na estrutura de Oligopólio, onde poucas empresas concentram poder de mercado e podem coordenar preços.",
    ],
  },
  {
    id:14,
    tag:"Cálculo · ERd com Classificação",
    text:"Determine a ERd e classifique:",
    data:[["Q em 15/01/2026","9.500 pç"],["Renda em 15/01/2026","R$ 2.700,00"],["Q em 15/02/2026","10.800 pç"],["Renda em 15/02/2026","R$ 2.500,00"]],
    type:"open",
    bullets:[
      "ΔQ = 10.800 − 9.500 = 1.300 pç → %ΔQ = 1.300 / 9.500 ≈ 13,68%",
      "ΔRenda = 2.500 − 2.700 = −200 → %ΔRenda = −200 / 2.700 ≈ −7,41%",
      "ERd = 13,68% ÷ (−7,41%) ≈ −1,85",
      "Classificação: ERd < 0 → BEM INFERIOR. A quantidade demandada aumentou quando a renda caiu.",
    ],
  },
  {
    id:15,
    tag:"Dissertativa · Ferramentas da Qualidade",
    text:"Indique as características das ferramentas da qualidade: <em>Just in Time, Kanban, TPM e 5S</em>, utilizadas por processos de produção.",
    type:"open",
    bullets:[
      "Just in Time (JIT): produzir apenas o necessário, no momento certo e na quantidade certa, eliminando desperdícios e estoques excessivos.",
      "Kanban: sistema de controle visual do fluxo produtivo; cartões sinalizam a necessidade de reposição ou início de produção.",
      "TPM (Total Productive Maintenance): manutenção produtiva total com participação de todos os colaboradores, visando zero falhas e zero defeitos.",
      "5S: programa de organização baseado em cinco sensos — Utilização (Seiri), Organização (Seiton), Limpeza (Seiso), Padronização (Seiketsu) e Disciplina (Shitsuke).",
    ],
  },
];

let score=0,answered=0;
const state={};

function updateProgress(){
  const pct=Math.round((answered/TOTAL)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${answered} / ${TOTAL} respondidas`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('score-display').textContent=`${score} / ${TOTAL}`;
  if(answered===TOTAL) setTimeout(showResults,600);
}

function markCard(qid,correct){
  document.getElementById(`card-${qid}`).classList.add(correct?'answered-correct':'answered-wrong');
}

function handleChoice(qid,chosen){
  if(state[qid]) return;
  state[qid]=true; answered++;
  const q=questions.find(x=>x.id===qid);
  const ok=chosen===q.correct;
  if(ok) score++;
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(btn=>{
    btn.disabled=true;
    const oid=btn.dataset.oid;
    if(oid===q.correct) btn.classList.add('is-correct');
    else if(oid===chosen&&!ok) btn.classList.add('is-wrong');
    else btn.classList.add('dim');
  });
  const fb=document.getElementById(`fb-${qid}`);
  fb.className='feedback '+(ok?'correct':'wrong');
  fb.innerHTML=`<div class="fb-label">${ok?'✓ Correto':'✗ Incorreto'}</div>${q.explanation}`;
  markCard(qid,ok); updateProgress();
}

function revealOpen(qid){
  if(state[qid]) return;
  state[qid]=true; answered++;
  document.getElementById(`btn-${qid}`).disabled=true;
  const q=questions.find(x=>x.id===qid);
  const fb=document.getElementById(`fb-${qid}`);
  fb.className='feedback info';
  fb.innerHTML=`<div class="fb-label">Resposta sugerida</div><ul class="fb-list">${q.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  markCard(qid,true); updateProgress();
}

function showResults(){
  const el=document.getElementById('results');
  el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'start'});
  document.getElementById('res-score').textContent=score;
  const tiers=[[0,6,"Continue revisando. Foque nas fórmulas de elasticidade e nas características de cada estrutura de mercado."],[7,10,"Bom desempenho! Revise as questões erradas para consolidar o conteúdo."],[11,13,"Muito bom! Você domina a maior parte dos conceitos."],[14,15,"Excelente! Domínio quase completo do simulado. 🎯"]];
  const t=tiers.find(([lo,hi])=>score>=lo&&score<=hi);
  document.getElementById('res-msg').textContent=t?t[2]:'';
}

function restart(){
  Object.keys(state).forEach(k=>delete state[k]);
  score=0; answered=0;
  document.getElementById('results').style.display='none';
  render(); updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderDataBox(rows){
  return `<div class="data-box">${rows.map(([k,v])=>`${k}: <span>${v}</span>`).join('<br>')}</div>`;
}
function renderPonder(items){
  return `<div class="ponder-list">${items.map(it=>`<div class="ponder-item"><strong>${it.key}.</strong>${it.text}</div>`).join('')}</div>`;
}

function render(){
  document.getElementById('quiz').innerHTML=questions.map(q=>{
    let body='';
    if(q.tag) body+=`<div class="section-tag">${q.tag}</div>`;
    if(q.items) body+=renderPonder(q.items);
    if(q.data)  body+=renderDataBox(q.data);

    if(q.type==='multi'){
      body+=`<div class="options">${q.options.map(opt=>`<button class="opt" data-qid="${q.id}" data-oid="${opt.id}" onclick="handleChoice(${q.id},'${opt.id}')"><span class="opt-bullet">${opt.id}</span>${opt.label}</button>`).join('')}</div>`;
    } else {
      body+=`<button class="btn-check" id="btn-${q.id}" onclick="revealOpen(${q.id})">Ver resposta sugerida</button>`;
    }
    body+=`<div class="feedback" id="fb-${q.id}"></div>`;

    return `<div class="card" id="card-${q.id}">
      <div class="q-header">
        <div class="q-num">${String(q.id).padStart(2,'0')}</div>
        <div class="q-text">${q.text}</div>
      </div>${body}</div>`;
  }).join('');
}

render(); updateProgress();
</script>
</body>
</html>
